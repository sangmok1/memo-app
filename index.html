<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="memo-sidebar">
      <div class="memo-list" id="memo-list"></div>
      <button class="btn-new-memo" id="btn-new-memo" title="새로 만들기">+</button>
    </aside>

    <div class="postit">
    <header class="titlebar">
      <div class="titlebar-drag"></div>
      <div class="titlebar-buttons">
        <button class="btn-icon" id="btn-settings" title="설정">⚙</button>
        <button class="btn-icon" id="btn-minimize" title="최소화">−</button>
        <button class="btn-icon" id="btn-close" title="닫기">×</button>
      </div>
    </header>

    <div class="find-bar hidden" id="find-bar">
      <input type="text" id="find-input" class="find-input" placeholder="찾기" aria-label="찾기" spellcheck="false">
      <span class="find-count" id="find-count"></span>
      <button type="button" class="find-btn" id="find-prev" title="이전 (⇧↵)">↑</button>
      <button type="button" class="find-btn" id="find-next" title="다음 (↵)">↓</button>
      <button type="button" class="find-btn find-close" id="find-close" title="닫기 (Esc)">×</button>
    </div>

    <div class="settings-panel hidden" id="settings-panel">
      <label class="color-label" for="color-slider" id="color-label">메모 색상</label>
      <input type="range" id="color-slider" min="0" max="360" value="54" class="color-slider">
      <label class="setting-row" id="auto-wrap-row">
        <input type="checkbox" id="auto-wrap" checked>
        <span>자동 줄바꿈</span>
      </label>
      <label class="setting-row setting-number-row" id="alarm-size-row" style="display: none;">
        <span>알람 크기</span>
        <input type="number" id="alarm-popup-size" class="setting-number-input" min="20" max="100" step="5" value="50">
        <span>%</span>
      </label>
      <label class="setting-row">
        <input type="checkbox" id="login-at-start" checked>
        <span>컴퓨터 켤 때 자동 실행</span>
      </label>
      <div class="settings-archive-row">
        <button class="btn-archive-link" id="btn-open-archive">폴더 열기</button>
        <span class="settings-archive-sep">·</span>
        <button class="btn-archive-link" id="btn-archive-report">기간별 보기</button>
      </div>
      <div class="settings-sync-block" id="sync-settings-block">
        <label class="setting-row">
          <input type="checkbox" id="sync-enabled">
          클라우드 동기화
        </label>
        <label class="setting-row hidden" id="memo-sync-key-row">
          <span>이 메모 키</span>
          <select id="memo-sync-key" class="sync-key-select"></select>
        </label>
        <div class="settings-sync-row hidden" id="sync-detail-row">
          <button class="btn-archive-link" id="btn-sync-new-key">+ 새 키</button>
          <span class="settings-archive-sep">·</span>
          <button class="btn-archive-link" id="btn-sync-connect">연결</button>
          <span class="settings-archive-sep">·</span>
          <button class="btn-archive-link" id="btn-sync-show-key">키 복사</button>
          <span class="settings-archive-sep">·</span>
          <button class="btn-archive-link" id="btn-sync-delete-key">키 삭제</button>
        </div>
        <p class="sync-status hidden" id="sync-status"></p>
      </div>
      <button class="btn-delete-memo" id="btn-delete-memo">이 메모 삭제</button>
    </div>

    <main class="content">
      <div class="scroll-area">
        <div id="memo-view" class="view-panel">
          <section class="section section-today">
            <div class="section-header">
              <h2>오늘 할일</h2>
              <span class="date" id="today-date"></span>
            </div>
            <ul class="todo-list" id="today-list"></ul>
            <button class="btn-add" data-list="today">+ 추가</button>
          </section>

          <div class="divider"></div>

          <section class="section section-general">
            <div class="section-header">
              <h2>할일</h2>
            </div>
            <ul class="todo-list" id="general-list"></ul>
            <button class="btn-add" data-list="general">+ 추가</button>
          </section>
        </div>

        <div id="alarm-view" class="view-panel hidden">
          <section class="section section-once">
            <div class="section-header">
              <h2>1회성 알람</h2>
            </div>
            <ul class="alarm-list" id="once-alarm-list"></ul>
            <button class="btn-add" id="btn-add-once-alarm">+ 알람 추가</button>
          </section>

          <div class="divider"></div>

          <section class="section section-recurring">
            <div class="section-header">
              <h2>주기적 알람</h2>
            </div>
            <ul class="alarm-list" id="recurring-alarm-list"></ul>
            <button class="btn-add" id="btn-add-recurring-alarm">+ 알람 추가</button>
          </section>
        </div>
      </div>
    </main>

    <footer class="footer" id="memo-footer">
      <button class="btn-summary" id="btn-summary">오늘 한일 정리하기</button>
    </footer>
    </div>
  </div>

  <div class="modal hidden" id="create-type-modal">
    <div class="modal-backdrop"></div>
    <div class="modal-content modal-content-sm">
      <h3>새로 만들기</h3>
      <div class="create-type-actions">
        <button class="create-type-btn" id="btn-create-memo">
          <span class="create-type-icon memo-icon"></span>
          <span>메모</span>
        </button>
        <button class="create-type-btn" id="btn-create-alarm">
          <span class="create-type-icon alarm-icon"></span>
          <span>알람</span>
        </button>
      </div>
    </div>
  </div>

  <div class="modal hidden" id="alarm-form-modal">
    <div class="modal-backdrop"></div>
    <div class="modal-content modal-content-form">
      <div class="modal-form-header">
        <h3 id="alarm-form-title">알람 추가</h3>
      </div>
      <div class="modal-form-scroll">
        <label class="form-label">알람 제목</label>
        <input type="text" id="alarm-title-input" class="form-input" placeholder="알람 제목">
        <label class="form-label">알람 내용</label>
        <textarea id="alarm-content-input" class="form-textarea" placeholder="알람 내용" maxlength="500"></textarea>
        <label class="form-label">시간 (KST)</label>
        <input type="time" id="alarm-time-input" class="form-input" value="09:00">
        <div id="alarm-date-row">
          <label class="form-label">날짜</label>
          <input type="date" id="alarm-date-input" class="form-input">
        </div>
        <div id="alarm-days-row" class="hidden">
          <label class="form-label">요일</label>
          <div class="day-picker" id="alarm-day-picker">
            <button type="button" class="day-btn" data-day="1">월</button>
            <button type="button" class="day-btn" data-day="2">화</button>
            <button type="button" class="day-btn" data-day="3">수</button>
            <button type="button" class="day-btn" data-day="4">목</button>
            <button type="button" class="day-btn" data-day="5">금</button>
            <button type="button" class="day-btn" data-day="6">토</button>
            <button type="button" class="day-btn" data-day="0">일</button>
          </div>
        </div>
        <label class="setting-row">
          <input type="checkbox" id="alarm-repeat-input">
          <span>반복하기 (주기적 알람)</span>
        </label>
      </div>
      <div class="modal-actions modal-form-footer">
        <button class="btn-copy" id="btn-save-alarm">저장</button>
        <button class="btn-close-modal" id="btn-cancel-alarm">취소</button>
      </div>
    </div>
  </div>

  <div class="modal hidden" id="summary-modal">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h3>오늘 한일 정리</h3>
      <textarea id="summary-text" readonly></textarea>
      <div class="modal-actions">
        <button class="btn-copy" id="btn-copy">복사</button>
        <button class="btn-close-modal" id="btn-close-modal">닫기</button>
      </div>
    </div>
  </div>

  <div class="modal hidden" id="sync-modal">
    <div class="modal-backdrop"></div>
    <div class="modal-content modal-content-sm">
      <h3 id="sync-modal-title">메모 동기화</h3>
      <p class="modal-message" id="sync-modal-message"></p>
      <input type="text" id="sync-key-input" class="form-input sync-key-input" readonly spellcheck="false">
      <p class="sync-hint" id="sync-hint"></p>
      <div class="modal-actions">
        <button class="btn-copy" id="btn-sync-copy-key">키 복사</button>
        <button class="btn-danger hidden" id="btn-sync-confirm-import">연결</button>
        <button class="btn-close-modal" id="btn-sync-close">닫기</button>
      </div>
    </div>
  </div>

  <div class="modal hidden" id="delete-modal">
    <div class="modal-backdrop"></div>
    <div class="modal-content modal-content-sm">
      <h3 id="delete-modal-title">삭제</h3>
      <p class="modal-message" id="delete-modal-message">삭제하시겠습니까?</p>
      <div class="modal-actions">
        <button class="btn-danger" id="btn-confirm-delete">삭제</button>
        <button class="btn-close-modal" id="btn-cancel-delete">취소</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
